<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TodoList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <h1>My Todo List</h1>

    <form action="/todo-list" method="post" class="todo-form">
        <input type="text" name="title" placeholder="Enter new task" required />
        <button type="submit" class="btn btn-primary">Add</button>
    </form>

    <div class="todo-container">
        <th:block th:each="task : ${tasks}">
            <div class="todo-item" th:classappend="${task.isCompleted} ? 'completed' : ''">
                <div class="d-flex align-items-center">
                    <input
                        type="checkbox"
                       th:checked="${task.isCompleted}"
                       th:attr="onchange='toggleTask(' + ${task.id} + ', this)'"
                        style="cursor: pointer;"
                    />
                    <p th:text="${task.title}" class="mb-0"></p>
                </div>
                <form th:action="@{/todo-list/delete/{id}(id=${task.id})}" method="post">
                    <button type="submit" class="fs-2">&times;</button>
                </form>
            </div>
        </th:block>
    </div>

    <script>
        function toggleTask(taskId, checkbox) {
            fetch(`/todo-list/toggle/${taskId}`, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(newState => {
                if(newState) {
                    checkbox.parentElement.parentElement.classList.add('completed');
                } else {
                    checkbox.parentElement.parentElement.classList.remove('completed');
                }
            });
        }
    </script>
</body>
</html>
